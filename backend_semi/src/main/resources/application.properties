spring.application.name=backend_semi
server.port=9000

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

productImageLocation=C:\\shop\\images
uploadPath=file:///C:/shop/images/

# --- MySQL ?? ??? ---
spring.datasource.url=jdbc:mysql://localhost:3306/coffee?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=trace
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# --- H2 ?? ?? ?? ---
#spring.datasource.url=jdbc:h2:file:./data/testdb;AUTO_SERVER=TRUE
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true

#spring.h2.console.path=/h2-console
#spring.sql.init.mode=always

server.servlet.session.timeout=120m

# File storage settings
file.upload-dir=${UPLOAD_PATH:./uploads/}
file.url-prefix=${FILE_URL_PREFIX:/uploads}

# Upload file size limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT
jwt.private-key-path=./secrets/jwt-private.pem
jwt.public-key-path=./secrets/jwt-public.pem
jwt.expiration=3600000

logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=DEBUG